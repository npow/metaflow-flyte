name: E2E Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      # Copy flows to the same stable absolute path that is baked into the
      # container image (Dockerfile.e2e: COPY tests/flows/ /app/tests/flows/).
      # This ensures FLOW_FILE in generated code matches the container.
      - name: Copy flows to stable container-matching path
        run: |
          sudo mkdir -p /app/tests/flows
          sudo cp tests/flows/*.py /app/tests/flows/

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push e2e task image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.e2e
          push: true
          # Lowercase the full image ref (owner/repo may contain uppercase).
          tags: ghcr.io/${{ github.repository }}:e2e-${{ github.sha }}

      - name: Install flytectl
        run: |
          curl -sL https://ctl.flyte.org/install | sudo bash -s -- -b /usr/local/bin
          flytectl version

      - name: Start Flyte sandbox
        run: flytectl demo start
        timeout-minutes: 15

      - name: Copy sandbox config to default pyflyte location
        run: cp ~/.flyte/config-sandbox.yaml ~/.flyte/config.yaml

      - name: Wait for Flyte admin to accept requests
        run: |
          for i in $(seq 1 30); do
            if flytectl get project 2>/dev/null | grep -q flytesnacks; then
              echo "Flyte admin is ready"
              break
            fi
            echo "Waiting for Flyte admin... attempt $i/30"
            sleep 10
          done
          # Final check — fail fast if still not ready
          flytectl get project | grep -q flytesnacks

      # Create the Metaflow bucket prefix inside the sandbox MinIO.
      # The demo pre-creates my-s3-bucket; we just need the metaflow/ prefix
      # to exist (S3 prefixes are implicit, so a touch object suffices).
      - name: Ensure Metaflow datastore prefix exists
        env:
          AWS_ACCESS_KEY_ID: minio
          AWS_SECRET_ACCESS_KEY: miniostorage
          AWS_DEFAULT_REGION: us-east-1
        run: |
          pip install awscli --quiet
          aws --endpoint-url http://localhost:30002 s3 ls s3://my-s3-bucket/ || true
          # Prefixes are implicit in S3 — no explicit creation needed.

      - name: Run remote e2e tests
        env:
          E2E_FLOWS_DIR: /app/tests/flows
          FLYTE_TEST_IMAGE: ghcr.io/${{ github.repository }}:e2e-${{ github.sha }}
          # Metaflow datastore → sandbox MinIO (host-accessible NodePort)
          METAFLOW_DEFAULT_DATASTORE: s3
          METAFLOW_DATASTORE_SYSROOT_S3: s3://my-s3-bucket/metaflow/
          METAFLOW_S3_ENDPOINT_URL: http://localhost:30002
          AWS_ACCESS_KEY_ID: minio
          AWS_SECRET_ACCESS_KEY: miniostorage
          AWS_DEFAULT_REGION: us-east-1
        run: |
          pytest tests/test_e2e_remote.py -v --timeout=300
