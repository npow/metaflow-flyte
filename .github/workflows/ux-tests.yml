name: UX Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

env:
  METAFLOW_DEFAULT_METADATA: local
  METAFLOW_DEFAULT_DATASTORE: local
  METAFLOW_DEFAULT_ENVIRONMENT: local

jobs:
  runner-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Pin Metaflow local datastore root
        run: echo "METAFLOW_DATASTORE_SYSROOT_LOCAL=$HOME" >> "$GITHUB_ENV"
      - uses: Netflix/metaflow/.github/actions/run-ux-tests@npow/corral-devstack
        with:
          metaflow-ref: npow/corral-devstack
          extra-install: "."
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
          pytest-args: "-n 4 -v --tb=short --timeout=120 --exec-mode runner --cov-fail-under=0"
          ux-test-config: |
            backends:
              - name: flyte-local
                scheduler_type: null
                cluster: null
                decospec: null
                enabled: true

  deployer-tests:
    runs-on: ubuntu-latest
    # Runs deployer tests against a real Flyte cluster (flytectl demo start).
    #
    # Metadata sharing architecture:
    # - flytectl demo starts a k3d (k3s-in-Docker) Flyte sandbox.
    # - A HostPath PersistentVolume backed by /var/lib/flyte/storage/metaflow_meta
    #   (inside the flyte-sandbox Docker container) is created in k3s.
    # - A PodTemplate named "default" in the flytesnacks-development namespace
    #   tells Flyte propeller to mount this PVC into every task pod.
    # - Task containers write Metaflow local metadata to /var/lib/flyte/metaflow_meta.
    # - On Linux (GHA), the Docker volume is accessible to the host at
    #   /var/lib/docker/volumes/flyte-sandbox/_data/metaflow_meta, so the test
    #   runner can call metaflow.Run(pathspec) to read task metadata and artifacts.
    # - S3 artifacts go to sandbox MinIO (in-cluster DNS for pods,
    #   localhost:30002 NodePort for the host).
    timeout-minutes: 90
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Check out metaflow before building the image so UX flows are available.
      - name: Check out metaflow (for UX flows)
        uses: actions/checkout@v4
        with:
          repository: Netflix/metaflow
          ref: npow/corral-devstack
          path: _metaflow_src

      - name: Install flytectl
        run: |
          curl -sL https://ctl.flyte.org/install | sudo bash -s -- -b /usr/local/bin
          flytectl version

      - name: Start Flyte sandbox
        # flytectl demo start pulls the sandbox image and waits for readiness.
        run: flytectl demo start
        timeout-minutes: 15

      - name: Write pyflyte/flytectl config with storage section
        # config-sandbox.yaml only has the admin endpoint. Add the MinIO storage
        # section so pyflyte --remote --copy all can upload code bundles.
        run: |
          cat > ~/.flyte/config.yaml << 'EOF'
          admin:
            endpoint: dns:///localhost:30080
            insecure: true
          storage:
            type: stow
            stow:
              kind: s3
              config:
                region: us-east-1
                disable_ssl: true
                v2_signing: false
                endpoint: http://localhost:30002
                auth_type: accesskey
                access_key_id: minio
                secret_access_key: miniostorage
            container: my-s3-bucket
          EOF

      - name: Wait for Flyte admin
        run: |
          for i in $(seq 1 30); do
            if flytectl get project 2>/dev/null | grep -q flytesnacks; then
              echo "Flyte admin is ready"
              break
            fi
            echo "Waiting... attempt $i/30"
            sleep 10
          done
          flytectl get project | grep -q flytesnacks

      - name: Create shared Metaflow metadata dir, k3s PV and PVC
        # Create a hostPath-backed PV/PVC for Metaflow local metadata sharing.
        # The PodTemplate (which references the UX task image) is created AFTER
        # the image is built so it can use the pre-loaded image instead of pulling.
        run: |
          docker exec flyte-sandbox mkdir -p /var/lib/flyte/storage/metaflow_meta

          # flytesnacks-development namespace is created by Flyte Admin when it
          # processes the seedProjects list; it may lag the API being ready.
          for i in $(seq 1 30); do
            if docker exec flyte-sandbox kubectl get namespace flytesnacks-development 2>/dev/null; then
              echo "Namespace ready"
              break
            fi
            echo "Waiting for namespace... attempt $i/30"
            sleep 5
          done
          docker exec flyte-sandbox kubectl get namespace flytesnacks-development

          docker exec -i flyte-sandbox kubectl apply -f - << 'YAML'
          apiVersion: v1
          kind: PersistentVolume
          metadata:
            name: metaflow-meta-pv
          spec:
            capacity:
              storage: 5Gi
            accessModes: [ReadWriteMany]
            persistentVolumeReclaimPolicy: Retain
            storageClassName: ""
            hostPath:
              path: /var/lib/flyte/storage/metaflow_meta
          ---
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: metaflow-meta-pvc
            namespace: flytesnacks-development
          spec:
            accessModes: [ReadWriteMany]
            storageClassName: ""
            volumeName: metaflow-meta-pv
            resources:
              requests:
                storage: 5Gi
          YAML

          DOCKER_VOL=$(docker volume inspect flyte-sandbox --format '{{ .Mountpoint }}')
          echo "MF_HOST_SYSROOT=${DOCKER_VOL}/metaflow_meta" >> "$GITHUB_ENV"
          echo "Host sysroot: ${DOCKER_VOL}/metaflow_meta"

      - name: Build, push and import UX task image into k3s
        # Flatten all UX flows into ux_flows/ for the Docker build context.
        # Tag with $GITHUB_SHA so Kubernetes uses IfNotPresent pull policy.
        # Import into k3s containerd (k8s.io namespace) so task pods find it
        # without pulling — k3s pods cannot reach localhost:30000 directly.
        run: |
          mkdir -p ux_flows
          find _metaflow_src/test/ux/core/flows -name "*.py" -exec cp {} ux_flows/ \;
          IMAGE_REF="localhost:30000/metaflow-flyte-ux:${GITHUB_SHA::8}"
          docker build -t "$IMAGE_REF" -f Dockerfile.ux .
          docker push "$IMAGE_REF"
          docker save "$IMAGE_REF" | docker exec -i flyte-sandbox \
            /bin/ctr -a /run/k3s/containerd/containerd.sock -n k8s.io images import -
          echo "UX_IMAGE=${IMAGE_REF}" >> "$GITHUB_ENV"

      - name: Create PodTemplate with pre-loaded UX image
        # The PodTemplate injects the metaflow-meta volume into task pods.
        # Use the pre-loaded UX task image (already in k3s containerd) to avoid
        # any image pull delays caused by a different placeholder image.
        # Flyte propeller merges the "default" PodTemplate into every task pod
        # in the flytesnacks-development namespace.
        run: |
          docker exec -i flyte-sandbox kubectl apply -f - << YAML
          apiVersion: v1
          kind: PodTemplate
          metadata:
            name: default
            namespace: flytesnacks-development
          template:
            spec:
              volumes:
              - name: metaflow-meta
                persistentVolumeClaim:
                  claimName: metaflow-meta-pvc
              containers:
              - name: primary
                image: ${UX_IMAGE}
                volumeMounts:
                - name: metaflow-meta
                  mountPath: /var/lib/flyte/metaflow_meta
          YAML

      - name: Pin host-side Metaflow sysroot
        run: echo "METAFLOW_DATASTORE_SYSROOT_LOCAL=$MF_HOST_SYSROOT" >> "$GITHUB_ENV"

      - uses: Netflix/metaflow/.github/actions/run-ux-tests@npow/corral-devstack
        env:
          # FLYTECTL_CONFIG tells pyflyte where to find the Flyte endpoint + MinIO.
          FLYTECTL_CONFIG: /home/runner/.flyte/config.yaml
          # S3 datastore (sandbox MinIO via NodePort).
          # AWS_ENDPOINT_URL_S3 is picked up by boto3 without being injected
          # into task containers (which use the baked-in in-cluster DNS URL).
          METAFLOW_DEFAULT_DATASTORE: s3
          METAFLOW_DATASTORE_SYSROOT_S3: "s3://my-s3-bucket/metaflow/"
          AWS_ENDPOINT_URL_S3: "http://localhost:30002"
          AWS_ACCESS_KEY_ID: minio
          AWS_SECRET_ACCESS_KEY: miniostorage
          AWS_DEFAULT_REGION: us-east-1
        with:
          metaflow-ref: npow/corral-devstack
          extra-install: "."
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
          # No xdist (-n 0): concurrent pyflyte --remote calls can collide.
          # Only hello_world: basic smoke-test with real Flyte task scheduling.
          # timeout=1800: accounts for code upload + Flyte scheduling + image pull.
          pytest-args: "-n 0 -v --tb=short --timeout=1800 --exec-mode deployer --cov-fail-under=0 -k 'hello_world'"
          test-files: "test_basic.py"
          ux-test-config: |
            backends:
              - name: flyte-deployer
                scheduler_type: flyte
                cluster: null
                decospec: null
                deploy_args:
                  flyte_endpoint: "localhost:30080"
                  image: "${{ env.UX_IMAGE }}"
                  container_flows_dir: "/app/flows"
                  container_sysroot: "/var/lib/flyte/metaflow_meta"
                enabled: true
