name: UX Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

env:
  METAFLOW_DEFAULT_METADATA: local
  METAFLOW_DEFAULT_DATASTORE: local
  METAFLOW_DEFAULT_ENVIRONMENT: local

jobs:
  runner-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Pin Metaflow local datastore root
        run: echo "METAFLOW_DATASTORE_SYSROOT_LOCAL=$HOME" >> "$GITHUB_ENV"
      - uses: Netflix/metaflow/.github/actions/run-ux-tests@npow/corral-devstack
        with:
          metaflow-ref: npow/corral-devstack
          extra-install: "."
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
          pytest-args: "-n 4 -v --tb=short --timeout=120 --exec-mode runner --cov-fail-under=0"
          ux-test-config: |
            backends:
              - name: flyte-local
                scheduler_type: null
                cluster: null
                decospec: null
                enabled: true

  deployer-tests:
    runs-on: ubuntu-latest
    # All deployer tests run sequentially in one job.  The Flyte deployer's
    # trigger command runs pyflyte run in-process (no --remote), so no external
    # Flyte cluster is required — flytekit handles execution locally.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Pin Metaflow local datastore root
        run: echo "METAFLOW_DATASTORE_SYSROOT_LOCAL=$HOME" >> "$GITHUB_ENV"
      - uses: Netflix/metaflow/.github/actions/run-ux-tests@npow/corral-devstack
        with:
          metaflow-ref: npow/corral-devstack
          extra-install: "."
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
          # Run deployer mode without xdist parallelism (-n 0): concurrent pyflyte
          # run invocations can collide in the local Metaflow datastore.
          # Known flyte-deployer limitations skipped with -k:
          #   retry        — @retry requires a cluster-side retry loop; local
          #                  pyflyte run re-raises on attempt 0.
          #   nested_foreach — nested foreach codegen not yet supported.
          # test_config.py is omitted entirely: Config / config_expr require
          # METAFLOW_FLOW_CONFIG_VALUE propagation, not yet implemented.
          pytest-args: "-n 0 -v --tb=short --timeout=300 --exec-mode deployer --cov-fail-under=0 -k 'not retry and not nested_foreach'"
          test-files: "test_basic.py test_dag.py"
          ux-test-config: |
            backends:
              - name: flyte-deployer
                scheduler_type: flyte
                cluster: null
                decospec: null
                deploy_args: {}
                enabled: true
